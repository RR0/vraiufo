<!DOCTYPE html>
<html lang="fr">
<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <title>Vraiufo</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&family=Barlow+Condensed:wght@500;600;700&display=swap"
      rel="stylesheet">
  <link href="index.css" rel="stylesheet">
</head>
<body>
<main class="desk" id="app"></main>
<script type="module">
  let lang = navigator.language.substring(0, 2)
  if (!["de", "en", "es", "fr", "it", "no", "pt", "sv"].includes(lang)) {
    lang = "en"
  }
  import {VraiUfo} from "./VraiUfo.mjs"

  let langImport
  switch (lang) {
    case "de":
      langImport = import("./lang/Messages_de.mjs")
      break
    case "es":
      langImport = import("./lang/Messages_es.mjs")
      break
    case "fr":
      langImport = import("./lang/Messages_fr.mjs")
      break
    case "it":
      langImport = import("./lang/Messages_it.mjs")
      break
    case "no":
      langImport = import("./lang/Messages_no.mjs")
      break
    case "pt":
      langImport = import("./lang/Messages_pt.mjs")
      break
    case "sv":
      langImport = import("./lang/Messages_sv.mjs")
      break
    case "en":
    default:
      langImport = import("./lang/Messages_en.mjs")
      break
  }
  langImport.then(messages => {
    const vraiUFO = new VraiUfo(messages.default)
    const caseIndex = window.location.hash?.substring(1)
    vraiUFO.init(caseIndex).then(() => {
      window.vraiUFO = vraiUFO
    })
  })
</script>
<script nomodule>
  alert("This website requires a modern browser")
</script>
</body>
</html>
